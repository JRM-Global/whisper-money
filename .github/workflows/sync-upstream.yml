name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Lunes 6am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/whisper-money/whisper-money.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit -m "chore: sync upstream $(date +%Y-%m-%d)" || echo "No changes or conflict"
          git push origin main
