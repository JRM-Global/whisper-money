name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Lunes 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/whisper-money/whisper-money.git
          git fetch upstream
          git checkout main
          if git merge upstream/main --no-edit -m "chore: sync upstream $(date +%Y-%m-%d)"; then
            git push origin main
          else
            echo "::warning::Merge conflict or nothing to merge; aborting. Manual sync may be required."
            git merge --abort || true
          fi
